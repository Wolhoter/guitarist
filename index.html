<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="репититор игра гитара" />
    <title>Портфолио гитарста</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <section class="main-section">
      <div class="container main-section__nav-container">
        <header class="main-section__header">
          <img
            src="./icons/logo.svg"
            alt="логотип школы"
            class="main-section__logo"
          />
        </header>
        <nav class="main-secton__nav nav-menu">
          <ul class="nav-menu__list">
            <li class="nav-menu__list-item"><a href="">Обо мне</a></li>
            <li class="nav-menu__list-item"><a href="">Занятия</a></li>
            <li class="nav-menu__list-item"><a href="">Запись</a></li>
          </ul>
        </nav>
      </div>
      <div class="container main-section__content-container">
        <div class="left-wrapper">
          <img
            src="./img/guitarhero.png"
            alt="гитаристик"
            class="left-wrapper__img"
          />
          <div class="left-wrapper__rectangle-blue"></div>
          <div class="left-wrapper__rectangle-orange"></div>
          <div class="left-wrapper__rectangle-grey"></div>
        </div>
        <div class="right-wrapper">
          <div class="right-wrapper__icon-box icons">
            <div class="icons__item"><i class="bi bi-telegram"></i></div>
            <div class="icons__item"><i class="bi bi-discord"></i></div>
            <div class="icons__item"><i class="bi bi-microsoft-teams"></i></div>
            <div class="icons__item"><i class="bi bi-youtube"></i></div>
          </div>
          <h1 class="right-wrapper__title title">Я Виктор</h1>
          <p class="right-wrapper__text">
            репититор игры на гитаре с семелетним опытом
          </p>
          <div class="right-wrapper__button buttons">
            <button class="buttons__main-btn">
              Забронировать <br />
              Урок
            </button>
            <div class="right-wrapper__icon-bth buttons__icon-btn">
              <img src="./icons/chat.svg" alt="албтьу" />
              <p class="button__text">
                Есть <br />
                вопросы?
              </p>
            </div>
          </div>
        </div>
        <div class="main-section__first-ring ring"></div>
      </div>
      <div class="main-section__second-ring ring ring_big"></div>
    </section>
    <section class="section-courses">
      <div class="sectoin-courses__container container">
        <h2 class="section-courses__title title">Преподаю</h2>
        <div class="section-courses__cards-box">
          <div class="section-courses__cards-item cards-item">
            <img
              src="./img/electro.png"
              alt="фотка гитары"
              class="cards-item__img"
            />
            <p class="cards-item__text">электро гитара</p>
          </div>
          <div class="section-courses__cards-item cards-item">
            <img
              src="./img/akystik.png"
              alt="фотка гитары"
              class="cards-item__img"
            />
            <p class="cards-item__text">акустическая гитара</p>
          </div>
          <div class="section-courses__cards-item cards-item">
            <img
              src="./img/ykylele.png"
              alt="фотка гитары"
              class="cards-item__img"
            />
            <p class="cards-item__text">укулеле гитара</p>
          </div>
        </div>

        <div class="section-courses__icons-box">
          <div class="section-courses__icons-item">
            <img src="./icons/1kubok.svg" alt="кубок" class="icons-item__img" />
            <p class="icons-item__text"><span>7</span> лет преподавания</p>
          </div>
          <div class="section-courses__icons-item">
            <img
              src="./icons/3listok.svg"
              alt="листок"
              class="icons-item__img"
            />
            <p class="icons-item__text"><span>276</span>отзывов на 5 звезд</p>
          </div>
          <div class="section-courses__icons-item">
            <img src="./icons/4book.svg" alt="книга" class="icons-item__img" />
            <p class="icons-item__text"><span>314</span>студентов обучено</p>
          </div>
          <div class="section-courses__icons-item">
            <img src="./icons/2nota.svg" alt="нота" class="icons-item__img" />
            <p class="icons-item__text"><span>2000</span>часов преподавания</p>
          </div>
        </div>
      </div>
    </section>
    <section class="section-lerning"></section>
    <footer class="footer"></footer>

      <div class="block_text"><p>fgghhgghwhgh</p></div>
    </div>
    <div class="block-2">
      <div class="block-2_text"><p>fjrje;ergrwe;</p></div>
    </div>
    <div class="header">
      <div class="header-button"><div class="header-button__text"></div></div>
    </div> -->
  </body>
</html>
