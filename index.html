<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="репититор игра гитара" />
    <title>Портфолио гитарста</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <section class="main-section">
      <div class="container main-section__nav-container">
        <header class="main-section__header">
          <img
            src="./icons/logo.svg"
            alt="логотип школы"
            class="main-section__logo"
          />
        </header>
        <nav class="main-secton__nav nav-menu">
          <ul class="nav-menu__list">
            <li class="nav-menu__list-item"><a href="">Обо мне</a></li>
            <li class="nav-menu__list-item"><a href="">Занятия</a></li>
            <li class="nav-menu__list-item"><a href="">Запись</a></li>
          </ul>
        </nav>
      </div>
      <div class="container main-section__content-container">
        <div class="left-wrapper">
          <img
            src="./img/guitarhero.png"
            alt="гитаристик"
            class="left-wrapper__img"
          />
          <div class="left-wrapper__rectangle-blue"></div>
          <div class="left-wrapper__rectangle-orange"></div>
          <div class="left-wrapper__rectangle-grey"></div>
        </div>
        <div class="right-wrapper">
          <div class="right-wrapper__icon-box icons">
            <div class="icons__item"><i class="bi bi-telegram"></i></div>
            <div class="icons__item"><i class="bi bi-discord"></i></div>
            <div class="icons__item"><i class="bi bi-microsoft-teams"></i></div>
            <div class="icons__item"><i class="bi bi-youtube"></i></div>
          </div>
          <h1 class="right-wrapper__title title">Я Виктор</h1>
          <p class="right-wrapper__text">
            репититор игры на гитаре с семелетним опытом
          </p>
          <div class="right-wrapper__button buttons">
            <button class="buttons__main-btn">Забронировать <br> Урок</button>
            <div class="right-wrapper__icon-bth buttons__icon-btn">
              <img src="./icons/chat.svg" alt="албтьу" />
              <p class="button__text">Есть <br> вопросы?</p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="section-courses"></section>
    <section class="section-lerning"></section>
    <footer class="footer"></footer>
